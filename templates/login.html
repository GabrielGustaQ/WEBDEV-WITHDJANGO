{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h1 class="h4 mb-3">Acesso ao Sistema</h1>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
